<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | Flipick</title>
  <meta name="robots" content="noindex">
  <meta property="og:locale" content="en_US">
  <meta name="author" content="Flipick">
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..800;1,14..32,400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    .err {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--night);
      position: relative;
      overflow: hidden;
    }
    .err::before {
      content: "";
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(68,76,236,.22), transparent 62%);
      top: -300px;
      right: -200px;
      pointer-events: none;
    }
    .err::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(156,161,246,.12), transparent 62%);
      bottom: -200px;
      left: -150px;
      pointer-events: none;
    }
    .err-inner {
      position: relative;
      text-align: center;
      padding: 60px 24px;
      max-width: 600px;
    }
    .err-code {
      font: 800 clamp(120px, 20vw, 200px)/1 var(--disp);
      background: linear-gradient(165deg, var(--brand-mid) 0%, var(--brand) 50%, var(--brand-deep) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: .85;
      margin: 0 0 24px;
      letter-spacing: -.06em;
    }
    .err-inner h1 {
      font: 700 clamp(24px, 3.5vw, 38px)/1.2 var(--disp);
      color: #fff;
      margin: 0 0 14px;
    }
    .err-inner p {
      color: #C8C9E2;
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 36px;
    }
    .err-inner .btn-primary {
      background: #fff;
      color: var(--brand);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .err-inner .btn-primary:hover {
      background: var(--paper);
    }
    .err-path {
      display: inline-block;
      margin-top: 28px;
      font: 500 13px/1 var(--body);
      color: rgba(255,255,255,.25);
      background: rgba(255,255,255,.06);
      padding: 8px 16px;
      border-radius: 8px;
      letter-spacing: .02em;
      word-break: break-all;
      max-width: 100%;
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<main>

<section class="err">
  <div class="err-inner">
    <div class="err-code">404</div>
    <h1>This page doesn't exist.</h1>
    <p>The link may be broken, or the page may have moved. Head back home and you'll find your way.</p>
    <a class="btn btn-primary" href="/">Back to home</a>
    <div class="err-path" id="errPath"></div>
  </div>
</section>

</main>

<div id="footer-placeholder"></div>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/includes.js"></script>
<script src="/assets/js/navigation.js"></script>
<script src="/assets/js/main.js"></script>
<script>
  var el = document.getElementById('errPath');
  if (el && window.location.pathname !== '/404.html') {
    el.textContent = window.location.pathname;
  }
</script>
</body>
</html>
